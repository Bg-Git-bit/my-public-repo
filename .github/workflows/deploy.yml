name: Deploy to AWS

on:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: aws-production
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Upload script to S3
      run: |
        aws s3 cp scripts/aws_glue_Script_1.py \
          s3://${{ secrets.S3_OUTPUT_BUCKET }}/scripts/aws_glue_Script_1.py
    
    - name: Deploy Glue job
      run: |
        python scripts/deploy_glue_job.py --environment prod
    
    - name: Notify deployment
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          const status = '${{ job.status }}'
          const message = `Glue Pipeline Deployment: ${status.toUpperCase()}`
          console.log(message)
    
    - name: Create deployment record
      uses: actions/create-release@v1
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: deployed-${{ github.run_number }}
        release_name: Deployment ${{ github.run_number }}
        body: |
          Glue pipeline deployed to production
          Commit: ${{ github.sha }}
          Job: ${{ github.run_id }}
        draft: false
        prerelease: false

  terraform:
    runs-on: ubuntu-latest
    environment:
      name: aws-production
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Init
      working-directory: terraform
      run: terraform init
    
    - name: Terraform Plan
      working-directory: terraform
      run: |
        terraform plan \
          -var="aws_region=${{ secrets.AWS_REGION }}" \
          -var="s3_input_bucket=${{ secrets.S3_INPUT_BUCKET }}" \
          -var="s3_output_bucket=${{ secrets.S3_OUTPUT_BUCKET }}" \
          -var="glue_service_role_arn=${{ secrets.GLUE_ROLE_ARN }}" \
          -out=tfplan
    
    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply tfplan
