name: Deploy to AWS Dev

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: aws-development
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Upload scripts to S3
      run: |
        # Sync all files in scripts/ to the S3 bucket scripts/ prefix
        aws s3 sync scripts/ s3://${{ secrets.S3_OUTPUT_BUCKET }}/scripts/
    
    - name: Notify deployment
      if: always()
      uses: actions/github-script@v6
      with:
        script: |
          const status = '${{ job.status }}'
          const message = `Glue Pipeline Dev Deployment: ${status.toUpperCase()}`
          console.log(message)
    

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: dev-deployed-${{ github.run_number }}
        name: Dev Deployment ${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.MY_GH_TOKEN }}

  terraform:
    needs: deploy
    runs-on: ubuntu-latest
    environment:
      name: aws-development
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Init
      working-directory: terraform
      run: terraform init
    
    - name: Terraform Plan
      working-directory: terraform
      run: |
        terraform plan \
          -var="aws_region=${{ secrets.AWS_REGION }}" \
          -var="s3_input_bucket=${{ secrets.S3_INPUT_BUCKET }}" \
          -var="s3_output_bucket=${{ secrets.S3_OUTPUT_BUCKET }}" \
          -var="glue_service_role_arn=${{ secrets.GLUE_ROLE_ARN }}" \
          -var="environment=dev" \
          -out=tfplan
    
    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply tfplan
